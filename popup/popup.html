<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>METU Mail Notifier</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <!-- ── Header ─────────────────────────────────────────────────── -->
    <header class="header">
      <div class="header-icon">&#x2709;</div>
      <div class="header-text">
        <span class="header-title">METU Mail</span>
        <span class="header-sub">Inbox Notifier</span>
      </div>
      <div class="master-toggle-wrap">
        <label class="toggle" title="Enable / Disable extension">
          <input type="checkbox" id="masterToggle" />
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </label>
      </div>
    </header>

    <!-- ── Main content ───────────────────────────────────────────── -->
    <main class="main" id="mainContent">
      <section class="section">
        <p class="section-label">Settings</p>
        <div class="option-list">
          <div class="option-row">
            <div class="option-text">
              <span class="option-title">Notification Sound</span>
              <span class="option-desc">Play a chime when new mail arrives</span>
            </div>
            <label class="toggle toggle--sm">
              <input type="checkbox" id="soundToggle" />
              <span class="toggle-track">
                <span class="toggle-thumb"></span>
              </span>
            </label>
          </div>
        </div>
      </section>

      <div class="last-check-row">
        <span class="last-check-text">Last checked: <strong id="lastCheckTime">Never</strong></span>
        <button id="manualCheckBtn" class="icon-btn" title="Check now" aria-label="Check now">
          <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
          </svg>
        </button>
      </div>

      <div id="status" class="toast toast--below-pref" aria-live="polite"></div>

      <!-- ── Disabled overlay (inside main so header toggle stays accessible) -->
      <div class="disabled-overlay" id="disabledOverlay">
        <div class="disabled-msg">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"
                  fill="currentColor"/>
          </svg>
          <p><strong>Extension paused</strong><br />Flip the toggle above to resume mail checking</p>
        </div>
      </div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
